apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: extensions-pvc
  namespace: openvsx
  labels:
    app.kubernetes.io/name: openvsx
    app.kubernetes.io/component: openvsx-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openvsx-server
  namespace: openvsx
  labels:
    app.kubernetes.io/name: openvsx
    app.kubernetes.io/component: openvsx-server
    app.kubernetes.io/instance: openvsx-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openvsx
      app.kubernetes.io/component: openvsx-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openvsx
        app.kubernetes.io/component: openvsx-server
        app.kubernetes.io/instance: openvsx-server
    spec:
      containers:
        - name: openvsx-server
          image: ghcr.io/eclipse-openvsx/openvsx-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /home/openvsx/server/config
              readOnly: true
            - name: extensions-storage
              mountPath: /tmp/extensions
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 30
            timeoutSeconds: 5
          securityContext:
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: openvsx-server-config
        - name: extensions-storage
          persistentVolumeClaim:
            claimName: extensions-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: openvsx-server
  namespace: openvsx
  labels:
    app.kubernetes.io/name: openvsx
    app.kubernetes.io/component: openvsx-server
    app.kubernetes.io/instance: openvsx-server
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: openvsx
    app.kubernetes.io/component: openvsx-server
